<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>StreamScreen Host</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        margin: 0;
        background: #0d1117;
        color: #e6edf3;
        padding: 20px;
      }
      h1 { font-size: 18px; margin: 0 0 4px; }
      .sub { color: #8b949e; font-size: 12px; margin-bottom: 16px; }
      .code {
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 6px;
        text-align: center;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 6px; }
      select {
        width: 100%;
        padding: 8px;
        background: #161b22;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .stats {
        font-size: 12px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px;
        white-space: pre-wrap;
        min-height: 80px;
      }
      .free { margin-top: 16px; font-size: 11px; color: #3fb950; text-align: center; }
      .consent { margin-bottom: 16px; }
      .consent:empty { display: none; }
      .consent-card {
        background: #161b22;
        border: 1px solid #d29922;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .consent-info { flex: 1; font-size: 13px; }
      .consent-card button {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #21262d;
        color: #e6edf3;
        cursor: pointer;
      }
      .consent-card button:first-of-type { border-color: #3fb950; color: #3fb950; }
    </style>
  </head>
  <body>
    <h1>StreamScreen Host</h1>
    <div class="sub">Share this code with a viewer on the same network.</div>
    <div class="code" id="code">------</div>

    <div class="consent" id="consent"></div>

    <label for="source">Screen to share</label>
    <select id="source"></select>

    <label>Live link</label>
    <div class="stats" id="stats">Waiting for a viewer to connect…</div>

    <div class="free">Always free · Unlimited time · No bitrate caps · Peer-to-peer</div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>

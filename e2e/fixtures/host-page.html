<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StreamScreen e2e — host</title>
    <!-- Empty inline favicon: stops Chromium from auto-requesting /favicon.ico,
         which the fixture server has no file for and answers with a 404 (noise). -->
    <link rel="icon" href="data:," />
    <style>
      body { margin: 0; font-family: monospace; background: #111; color: #0f0; }
      #lastInput { padding: 8px; white-space: pre; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas id="screen" width="640" height="480"></canvas>
    <div id="status">host: booting</div>
    <div id="frame">frame: 0</div>
    <div id="lastInput">lastInput: none</div>

    <script type="module">
      import {
        Peer,
        SignalingClient,
        AdaptiveController,
        createReceiver,
        createSender,
        ReceiverRouter,
      } from './core.bundle.js';

      const params = new URLSearchParams(location.search);
      const code = params.get('code') ?? '123456';
      // When `audio=1`, the host mixes a synthetic loopback/system-audio track
      // (oscillator -> MediaStreamDestination) into the captured stream so the
      // viewer can prove system-audio streaming over WebRTC.
      const withAudio = params.get('audio') === '1';
      const wsUrl = `ws://${location.host}`;

      const statusEl = document.getElementById('status');
      const frameEl = document.getElementById('frame');
      const lastInputEl = document.getElementById('lastInput');
      const canvas = document.getElementById('screen');
      const ctx = canvas.getContext('2d');

      // --- Animated "screen": a moving gradient block + a frame counter. ---
      let frame = 0;
      function draw() {
        frame += 1;
        const w = canvas.width;
        const h = canvas.height;
        ctx.fillStyle = '#202830';
        ctx.fillRect(0, 0, w, h);
        const x = (frame * 4) % (w - 80);
        ctx.fillStyle = `hsl(${(frame * 3) % 360}, 80%, 55%)`;
        ctx.fillRect(x, h / 2 - 40, 80, 80);
        ctx.fillStyle = '#ffffff';
        ctx.font = '28px monospace';
        ctx.fillText(`FRAME ${frame}`, 16, 40);
        frameEl.textContent = `frame: ${frame}`;
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);

      // captureStream stands in for desktopCapturer on the real host.
      const stream = canvas.captureStream(30);

      // Optionally attach a synthetic system-audio track. We use a Web Audio
      // oscillator routed into a MediaStreamDestination — the audio analogue of
      // the canvas captureStream — so there is a real, "live" audio track to
      // negotiate over the peer connection.
      if (withAudio) {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          const audioCtx = new AC();
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = 440;
          const dest = audioCtx.createMediaStreamDestination();
          osc.connect(dest);
          osc.start();
          for (const at of dest.stream.getAudioTracks()) stream.addTrack(at);
          // Keep refs alive so GC doesn't stop the track mid-test.
          window.__hostAudio = { audioCtx, osc, dest };
        } catch (e) {
          window.__hostError = `audio setup: ${String(e)}`;
        }
      }

      // --- Multi-monitor: a fixed enumeration the viewer can list/switch. ---
      // Each "monitor" is just a different canvas the host can swap the outbound
      // video track to via replaceVideoTrack (no renegotiation).
      const monitors = [
        { id: 'mon-0', name: 'Display 1', primary: true, width: 640, height: 480 },
        { id: 'mon-1', name: 'Display 2', primary: false, width: 640, height: 480 },
      ];
      let activeMonitor = 'mon-0';

      // --- Test hooks the spec reads. ---
      const state = {
        ready: false,
        connectionState: 'new',
        dataChannelOpen: false,
        receivedInputs: [],
        lastInput: null,
        adaptiveDecisions: [],
        chats: [],
        activeMonitor,
        receivedFiles: [],
      };

      // Sum every byte (mod 2^32) — a cheap content checksum the spec compares
      // against the same computation on the sending side.
      function checksum(bytes) {
        let sum = 0;
        for (let i = 0; i < bytes.length; i++) {
          sum = (sum + bytes[i]) >>> 0;
        }
        return sum;
      }

      window.__host = {
        getFrame: () => frame,
        getState: () => ({
          ...state,
          receivedInputs: [...state.receivedInputs],
          chats: [...state.chats],
          receivedFiles: state.receivedFiles.map((f) => ({ ...f })),
        }),
        getReceivedInputs: () => [...state.receivedInputs],
        getLastInput: () => state.lastInput,
        getChats: () => [...state.chats],
        getActiveMonitor: () => activeMonitor,
        getReceivedFiles: () => state.receivedFiles.map((f) => ({ ...f })),
        sendChat: (text) => {
          peer.sendControl({ t: 'chat', text, ts: Date.now() });
        },
        // --- File transfer (host -> viewer), the reverse direction. ---
        // Streams `bytesArray` to the viewer using the core createSender over the
        // real control + file data channels: a `file-offer`, the viewer's
        // `file-accept`, the binary chunks, then `file-complete`. Resolves once
        // every chunk has been handed off.
        sendFileToViewer: async (id, name, mime, bytesArray) => {
          const data = new Uint8Array(bytesArray);
          const sender = createSender({
            meta: { id, name, size: data.byteLength, mime },
            data,
            send: (m) => peer.sendControl(m),
            sendChunk: (buf) => peer.sendFileChunk(buf),
            drain: () => peer.drainFile(),
          });
          // Release the chunk stream once the viewer's file-accept arrives.
          peer.onControl((m) => {
            if (m.t === 'file-accept' && m.id === id) sender.accept();
            if ((m.t === 'file-reject' || m.t === 'file-error') && m.id === id) {
              sender.abort(m.t);
            }
          });
          await sender.start();
          return true;
        },
      };

      const signaling = new SignalingClient(wsUrl);
      const peer = new Peer({ role: 'host', signaling });
      const adaptive = new AdaptiveController();

      // File reception, keyed by transfer id. We use the core createReceiver for
      // the framing/reassembly but gate completion on byte completeness rather
      // than blindly finishing on `file-complete`: the control-channel
      // `file-complete` can race ahead of the trailing binary chunks on the
      // separate `file` channel, so we only finalize once every offered byte has
      // arrived (whether that happens on the last chunk or on file-complete).
      //
      // Inbound binary frames are demultiplexed by their EMBEDDED transfer id via
      // a ReceiverRouter, so several concurrent transfers can interleave their
      // chunks over the single `file` channel without cross-contamination.
      const transfers = new Map(); // id -> { receiver, meta, size, completed, done }
      const router = new ReceiverRouter();

      function recordFile(receiver, meta) {
        const data = receiver.finish();
        state.receivedFiles.push({
          id: meta.id,
          name: meta.name,
          size: meta.size,
          length: data.byteLength,
          checksum: checksum(data),
        });
      }

      function maybeFinish(id) {
        const t = transfers.get(id);
        if (!t || t.done) return;
        // Finalize when the sender has signalled completion AND all bytes are in.
        if (t.completed && t.receiver.received >= t.size) {
          t.done = true;
          recordFile(t.receiver, t.meta);
          transfers.delete(id);
          router.unregister(id);
        }
      }

      peer.on('state', (s) => {
        state.connectionState = s;
        statusEl.textContent = `host: ${s}`;
      });
      peer.on('datachannel', (ch) => {
        const markOpen = () => {
          state.dataChannelOpen = true;
        };
        if (ch.readyState === 'open') markOpen();
        ch.addEventListener?.('open', markOpen);
        ch.onopen = markOpen;
      });

      peer.onInput((ev) => {
        state.receivedInputs.push(ev);
        state.lastInput = ev;
        lastInputEl.textContent = `lastInput: ${JSON.stringify(ev)}`;
        if (ev.t === 'm-move' || ev.t === 'm-down' || ev.t === 'm-up') {
          ctx.strokeStyle = '#ff0';
          ctx.beginPath();
          ctx.arc(ev.x * canvas.width, ev.y * canvas.height, 10, 0, Math.PI * 2);
          ctx.stroke();
        }
      });

      // Control channel: chat, monitor enumeration/switching, file routing.
      peer.onControl((m) => {
        switch (m.t) {
          case 'file-offer': {
            const meta = { id: m.id, name: m.name, size: m.size, mime: m.mime };
            const receiver = createReceiver({ meta });
            transfers.set(m.id, {
              receiver,
              meta,
              size: m.size,
              completed: false,
              done: false,
            });
            // Register with the router so its embedded-id frames get demuxed here.
            router.register(m.id, receiver);
            // Auto-accept: release the sender's chunk stream.
            peer.sendControl({ t: 'file-accept', id: m.id });
            break;
          }
          case 'file-complete': {
            const t = transfers.get(m.id);
            if (t) {
              t.completed = true;
              maybeFinish(m.id);
            }
            break;
          }
          case 'file-error':
          case 'file-reject':
            transfers.delete(m.id);
            router.unregister(m.id);
            break;
          case 'chat':
            state.chats.push(m);
            break;
          case 'request-monitors':
            peer.sendControl({ t: 'monitors', list: monitors });
            break;
          case 'switch-monitor': {
            // Build a fresh outbound video track from a new canvas and swap it
            // in place, then ack with monitor-switched.
            const mon = monitors.find((x) => x.id === m.id);
            if (mon) {
              const c2 = document.createElement('canvas');
              c2.width = mon.width;
              c2.height = mon.height;
              const x2 = c2.getContext('2d');
              let f2 = 0;
              const tick2 = () => {
                f2 += 1;
                x2.fillStyle = mon.primary ? '#103040' : '#401030';
                x2.fillRect(0, 0, c2.width, c2.height);
                x2.fillStyle = '#fff';
                x2.font = '24px monospace';
                x2.fillText(`${mon.name} #${f2}`, 16, 40);
                if (activeMonitor === mon.id) requestAnimationFrame(tick2);
              };
              const s2 = c2.captureStream(30);
              const vtrack = s2.getVideoTracks()[0];
              activeMonitor = mon.id;
              state.activeMonitor = mon.id;
              requestAnimationFrame(tick2);
              void peer.replaceVideoTrack(vtrack).then(() => {
                peer.sendControl({ t: 'monitor-switched', id: mon.id });
              });
            }
            break;
          }
          default:
            break;
        }
      });

      // Route each binary file chunk to its receiver by the transfer id embedded
      // in the frame (ReceiverRouter demuxes), then re-check completion of that
      // exact transfer in case its final chunk lands after `file-complete`.
      // Interleaved chunks from concurrent transfers are kept fully separate.
      peer.onFileChunk((buf) => {
        const receiver = router.handleChunk(buf);
        if (!receiver) return; // unknown id (e.g. already finalized) — dropped
        maybeFinish(receiver.meta.id);
      });

      async function adaptiveTick() {
        try {
          const stats = await peer.getStats();
          const decision = adaptive.update(stats);
          state.adaptiveDecisions.push(decision);
          await peer.applyDecision(decision);
        } catch {
          /* ignore until the connection is up */
        }
      }
      setInterval(adaptiveTick, 500);

      (async () => {
        await signaling.connect();
        await peer.start();
        peer.attachStream(stream);
        signaling.join({ code, role: 'host', name: 'e2e-host' });
        state.ready = true;
        statusEl.textContent = 'host: joined';
      })().catch((err) => {
        statusEl.textContent = `host: error ${String(err)}`;
        window.__hostError = String(err);
      });
    </script>
  </body>
</html>

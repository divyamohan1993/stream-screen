# CI gate for StreamScreen.
#
# This workflow is intentionally scoped to the parts that need ONLY the npm
# registry: install (npm ci), build/typecheck, and the unit-test suite
# (494 vitest specs across packages/*). It deliberately does NOT run
# Playwright/Electron, `playwright install`, `--with-deps`, or any apt step,
# because those require downloading browser/Electron binaries and OS packages
# that a runner with restrictive outbound egress cannot fetch — that was the
# cause of the earlier CI failure: the e2e workspace's `test` script is
# `playwright test`, and `npm run test --workspaces` pulled it in, failing
# the "unit tests" step with no Chromium available.
#
# The 15 Playwright e2e specs (e2e/) are run LOCALLY / pre-merge with a
# pre-provisioned Chromium, e.g.:
#   PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
#   PLAYWRIGHT_BROWSERS_PATH=/opt/pw-browsers npm run e2e
# They can be re-enabled in CI once reliable browser provisioning (a cached
# Chromium or a network path to the Playwright CDN) is available on the runner.

name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    env:
      # Never pull the Electron binary in CI — we only build/typecheck the host
      # app and run unit tests; we never launch Electron here.
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      # Never pull Playwright browsers in CI — e2e runs locally / pre-merge.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Run the unit suite for the library/app workspaces only (packages/*).
      # The e2e workspace's `test` script is `playwright test` and needs a
      # browser binary, so it is excluded here and run locally instead.
      - name: Unit tests
        run: npm run test --workspaces --if-present --workspace=packages
